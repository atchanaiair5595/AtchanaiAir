  <script>
        // รายการสินค้ากำหนดเองเพิ่มพิเศษ
        let customItemsList = [];

        // ฟังก์ชันกำหนดวันที่ปัจจุบัน (พ.ศ.) แบบอัตโนมัติ
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const dateStr = String(now.getDate()).padStart(2, '0') + '/' + 
                            String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                            (now.getFullYear() + 543);
            document.getElementById('docDate').innerText = dateStr;
            
            // สุ่มเลขที่เอกสารเพื่อความสมจริง
            const randNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('docNumber').innerText = `QT-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}-${randNum}`;
            
            calculateTotal();
        });

        // ฟังก์ชันดักจับปุ่มเพิ่มรายการด้วยตนเอง
        function addCustomItem() {
            const nameField = document.getElementById('customName');
            const priceField = document.getElementById('customPrice');
            const qtyField = document.getElementById('customQty');

            const name = nameField.value.trim();
            const price = parseFloat(priceField.value) || 0;
            const qty = parseInt(qtyField.value) || 1;

            if (name === '') {
                alert('โปรดระบุชื่อรายการบริการก่อนค่ะ');
                return;
            }
            if (price <= 0) {
                alert('โปรดใส่ราคาต่อหน่วยที่มากกว่า 0 บาทค่ะ');
                return;
            }

            // เพิ่มเข้าสู่ตัวแปรอาร์เรย์
            customItemsList.push({ name, price, qty });

            // ล้างฟอร์มกรอกรายการชั่วคราวออก
            nameField.value = '';
            priceField.value = '';
            qtyField.value = '1';

            // สั่งคำนวณใหม่และอัพเดทตารางทันที
            calculateTotal();
        }
       // ฟังก์ชันลบรายการบริการที่พิมพ์เพิ่มเอง
        function removeCustomItem(index) {
            customItemsList.splice(index, 1);
            calculateTotal();
        }

        // ฟังก์ชันแกนหลักในการคำนวณเงินและสะท้อนข้อมูลแบบเรียลไทม์
        function calculateTotal() {
            // ซิงค์ข้อมูลผู้ติดต่อลูกค้า
            const cName = document.getElementById('clientName').value.trim();
            const cPhone = document.getElementById('clientPhone').value.trim();
            document.getElementById('previewClientName').innerText = cName || '- ไม่ได้ระบุชื่อลูกค้า -';
            document.getElementById('previewClientPhone').innerText = cPhone || '-';

            const tableBody = document.getElementById('invoiceItemsTable');
            tableBody.innerHTML = ''; // เคลียร์ตารางเก่าออกก่อน

            let subtotal = 0;
            let hasItems = false;

            // อาเรย์เซ็ตบริการมาตรฐาน
            const standardServices = [
                { id: 'qtyWall', name: 'บริการล้างแอร์มาตรฐาน (ประเภทติดผนัง - Wall Type)', price: 500 },
                { id: 'qtyCeiling', name: 'บริการล้างแอร์มาตรฐาน (ประเภทแขวนใต้ฝ้า - Ceiling Type)', price: 800 },
                { id: 'qtyCassette', name: 'บริการล้างแอร์มาตรฐาน (ประเภทฝังฝ้าสี่ทิศทาง - Cassette Type)', price: 1500 }
            ];

            // วนลูปเช็คคะแนนจำนวนแอร์หลัก
            standardServices.forEach(srv => {
                const qty = parseInt(document.getElementById(srv.id).value) || 0;
                if (qty > 0) {
                    hasItems = true;
                    const itemTotal = qty * srv.price;
                    subtotal += itemTotal;

                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-200 hover:bg-slate-50 text-slate-700';
                    row.innerHTML = `
                        <td class="p-3 font-medium">${srv.name}</td>
                        <td class="p-3 text-right">${srv.price.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                        <td class="p-3 text-center font-bold">${qty}</td>
                        <td class="p-3 text-right font-semibold text-slate-900">${itemTotal.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                    `;
                    tableBody.appendChild(row);
                }
            });

            // วนลูปดึงรายการระบุอิสระเพิ่มเติมมาร่วมคำนวณ
            customItemsList.forEach((item, index) => {
                hasItems = true;
                const itemTotal = item.qty * item.price;
                subtotal += itemTotal;

                const row = document.createElement('tr');
                row.className = 'border-b border-slate-200 hover:bg-slate-50 text-slate-700';
                row.innerHTML = `
                    <td class="p-3 font-medium flex items-center gap-2">
                        <span>${item.name}</span>
                        <button onclick="removeCustomItem(${index})" class="no-print text-[10px] bg-red-100 hover:bg-red-200 text-red-600 px-1.5 py-0.5 rounded cursor-pointer transition">
                            <i class="fas fa-trash"></i> ลบ
                        </button>
                    </td>
                    <td class="p-3 text-right">${item.price.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                    <td class="p-3 text-center font-bold">${item.qty}</td>
                    <td class="p-3 text-right font-semibold text-slate-900">${itemTotal.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                `;
                tableBody.appendChild(row);
            });
                     // คำนวณภาษีมูลค่าเพิ่ม (VAT 7%) ตามปุ่มวิทยุเรดิโอตัวเลือก
            const vatCheck = document.querySelector('input[name="vatToggle"]:checked').value;
            let vatAmount = 0;
            let finalTotal = 0;

            if (vatCheck === 'yes') {
                // คำนวณราคาก่อนแวต ถอดฐานและคิดยอดภาษีเพิ่ม
                vatAmount = subtotal * 0.07;
                finalTotal = subtotal + vatAmount;
            } else {
                vatAmount = 0;
                finalTotal = subtotal;
            }

            // อัพเดทตัวเลขรวมเงินลงในตารางสรุปท้ายบิล
            document.getElementById('valSubtotal').innerText = subtotal.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('valVat').innerText = vatAmount.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('valTotal').innerText = finalTotal.toLocaleString('th-TH', {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
