<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บริการแอร์มืออาชีพ โคราช - เชื่อถือได้ ออกใบกำกับภาษี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-6 text-center">
        <h1 class="text-3xl font-bold">[ชื่อร้านของพี่]</h1>
        <p>บริการแอร์ครบวงจร สาขาในเมือง & สุรนารี | ออกใบกำกับภาษีเต็มรูปแบบ</p>
    </header>

    <main class="container mx-auto p-4 md:p-10">
        <!-- ระบบใบเสนอราคา -->
        <section id="quotation" class="bg-white p-6 rounded-lg shadow-lg mb-10">
            <h2 class="text-2xl font-bold mb-4 text-blue-800">สร้างใบเสนอราคาออนไลน์</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="custName" placeholder="ชื่อลูกค้า/บริษัท" class="border p-2 rounded w-full">
                <select id="serviceType" class="border p-2 rounded w-full">
                    <option value="500">ล้างแอร์แบบวอลล์ไทป์ (500 บาท)</option>
                    <option value="800">ล้างแอร์แขวน (800 บาท)</option>
                </select>
                <input type="number" id="qty" placeholder="จำนวนเครื่อง" class="border p-2 rounded w-full" value="1">
            </div>
            <button onclick="generateQuote()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">คำนวณและแสดงใบเสนอราคา</button>
        </section>

        <!-- พื้นที่แสดงผลใบเสนอราคา -->
        <div id="quoteDisplay" class="hidden bg-white p-8 border border-gray-300 rounded shadow-sm">
            <h3 class="text-xl font-bold text-center underline">ใบเสนอราคา</h3>
            <p><strong>ชื่อลูกค้า:</strong> <span id="outName"></span></p>
            <p><strong>รายการ:</strong> ล้างแอร์ <span id="outType"></span></p>
            <p><strong>จำนวน:</strong> <span id="outQty"></span> เครื่อง</p>
            <p class="text-2xl font-bold mt-4">รวมเป็นเงิน: <span id="outTotal"></span> บาท (รวม VAT แล้ว)</p>
            <button class="no-print mt-6 bg-blue-500 text-white px-4 py-2 rounded" onclick="window.print()">สั่งพิมพ์ / เซฟเป็น PDF</button>
        </div>
    </main>

    <script>
        function generateQuote() {
            const name = document.getElementById('custName').value;
            const price = parseInt(document.getElementById('serviceType').value);
            const qty = parseInt(document.getElementById('qty').value);
            const total = price * qty;

            document.getElementById('outName').innerText = name;
            document.getElementById('outType').innerText = document.getElementById('serviceType').options[document.getElementById('serviceType').selectedIndex].text;
            document.getElementById('outQty').innerText = qty;
            document.getElementById('outTotal').innerText = total.toLocaleString();
            document.getElementById('quoteDisplay').classList.remove('hidden');
        }
    </script>
</body>
</html>
